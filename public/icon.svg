<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="zenith-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square background matches the in-app header badge shape. -->
  <rect width="512" height="512" rx="96" fill="url(#zenith-bg)"/>
  <!-- Flame mark in white, using the exact lucide-react `Flame` path so it
       matches the in-app icon pixel-for-pixel. Lucide's native 24x24 viewBox
       is scaled 13× (312 units) and centered at (100, 100). -->
  <g transform="translate(100, 100) scale(13)" fill="#ffffff">
    <path d="M8.5,14.5 A 2.5 2.5 0 0 0 11 12 C 11 10.62 10.5 10 10 9 C 8.928 6.857 9.776 4.946 12 3 C 12.5 5.5 14 7.9 16 9.5 C 18 11.1 19 13 19 15 A 7 7 0 0 1 5 15 C 5 13.847 5.433 12.706 6 12 A 2.5 2.5 0 0 0 8.5 14.5 Z"/>
  </g>
</svg>
